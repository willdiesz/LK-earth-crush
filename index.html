<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            letter-spacing: 2px;
        }

        
        .countdown-container {
            text-align: center;
            margin-bottom: 50px;
        }

        .title {
            font-size: 1.2rem;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 20px;
            text-shadow: 0 0 5px rgba(255,255,255,0.2);
        }

        .timer {
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        
        .glitch-wrapper {
            padding: 20px;
        }

        .glitch {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            background: linear-gradient(45deg, #ff003c, #ffffff, #0055ff, #ff003c);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flowColors 5s ease infinite, glitchAnim 1s linear infinite;
        }

        .glitch::before,
        .glitch::after {
            content: "the legion fell apart";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
        }

        .glitch::before {
            left: 3px;
            text-shadow: -3px 0 #ff003c;
            -webkit-background-clip: text;
            animation: glitchTop 1.5s linear infinite alternate-reverse;
        }

        .glitch::after {
            left: -3px;
            text-shadow: 3px 0 #0055ff;
            -webkit-background-clip: text;
            animation: glitchBottom 1.5s linear infinite alternate;
        }

        
        @keyframes flowColors {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes glitchAnim {
            0%, 100% { transform: skew(0deg); }
            20% { transform: skew(-2deg); }
            25% { transform: skew(3deg); }
            60% { transform: skew(-1deg); }
            75% { transform: skew(1deg); }
        }

        @keyframes glitchTop {
            0% { clip-path: inset(0 0 60% 0); transform: translate(0); }
            20% { clip-path: inset(0 0 40% 0); transform: translate(-4px, -2px); }
            40% { clip-path: inset(0 0 80% 0); transform: translate(4px, 2px); }
            60% { clip-path: inset(0 0 20% 0); transform: translate(-2px, 2px); }
            80% { clip-path: inset(0 0 50% 0); transform: translate(2px, -2px); }
            100% { clip-path: inset(0 0 70% 0); transform: translate(0); }
        }

        @keyframes glitchBottom {
            0% { clip-path: inset(50% 0 0 0); transform: translate(0); }
            30% { clip-path: inset(70% 0 0 0); transform: translate(3px, 2px); }
            50% { clip-path: inset(30% 0 0 0); transform: translate(-3px, -2px); }
            70% { clip-path: inset(80% 0 0 0); transform: translate(2px, -1px); }
            90% { clip-path: inset(10% 0 0 0); transform: translate(-2px, 3px); }
            100% { clip-path: inset(40% 0 0 0); transform: translate(0); }
        }

        @media (max-width: 768px) {
            .timer { font-size: 2.5rem; }
            .glitch { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="countdown-container">
        <div class="title">red full moon is awakening...:</div>
        <div class="timer" id="countdown">00:00:00:00</div>
    </div>

    <div class="glitch-wrapper">
        <div class="glitch" data-text="the legion fell apart">the legion fell apart</div>
    </div>

    <script>
        function getTargetDate() {
            const now = new Date();
            let target = new Date(Date.UTC(now.getFullYear(), 5, 27, 14, 0, 0)); // 14:00 UTC = 17:00 МСК
            
            if (now > target) {
                target.setUTCFullYear(now.getUTCFullYear() + 1);
            }
            return target.getTime();
        }

        const countDownDate = getTargetDate();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const d = days < 10 ? "0" + days : days;
            const h = hours < 10 ? "0" + hours : hours;
            const m = minutes < 10 ? "0" + minutes : minutes;
            const s = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById("countdown").innerHTML = `${d}:${h}:${m}:${s}`;

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "00:00:00:00";
            }
        }, 1000);
    </script>

</body>
</html>
